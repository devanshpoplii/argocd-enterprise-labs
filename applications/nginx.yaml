apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx
  namespace: argocd
spec:
  project: payments
  source:
    repoURL: https://github.com/devanshpoplii/argocd-enterprise-labs.git
    targetRevision: HEAD
    path: workloads/nginx
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
